[package]
name = "blitz-quick-desktop"
version = "0.1.0"
edition = "2024"

[dependencies]
anyrender = "0.11"
anyrender_vello = "0.12"
anyrender_vello_cpu = "0.14"
blitz = {
  git = "https://github.com/DioxusLabs/blitz",
  rev = "f1811c8",
  features = ["scrollbars"]
}
blitz-paint = {
  git = "https://github.com/DioxusLabs/blitz",
  rev = "f1811c8",
  features = ["scrollbars"]
}
blitz-quick = { path = "../blitz-quick" }
clap = { version = "4.5", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["png"] }
notify = "8.2.0"
peniko = "0.6"
rquickjs = { version = "0.12.1", features = ["full-async"] }
serde_json = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }
tungstenite = { version = "0.28", default-features = false, features = ["handshake"] }
url = "2.5"


[profile.dev.package."*"]
opt-level = 2
